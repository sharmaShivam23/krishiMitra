
        
name: Deploy KrishiMitra to Amazon Linux

on:
  push:
    branches: [ "main" ] 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/krishimitra:latest

    - name: Deploy to EC2 Amazon Linux
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # Pull the latest image
          docker pull ${{ secrets.DOCKER_USERNAME }}/krishimitra:latest
          
          # Stop and remove the old container if it exists
          docker stop krishimitra || true
          docker rm krishimitra || true
          
          # Run the new container with the restart policy
          docker run -d \
            --restart unless-stopped \
            -p 3000:3000 \
            --name krishimitra \
            --env-file /home/ec2-user/.env \
            ${{ secrets.DOCKER_USERNAME }}/krishimitra:latest
          
          # Cleanup old unused images to save EC2 disk space
          docker system prune -af